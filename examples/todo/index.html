<!doctype html>
<meta charset="utf-8">
<title>Todo</title>
<link rel="stylesheet" href="../css/ds.css">
<link rel="stylesheet" href="../css/source.css">
<body>
<main>
	<h1>Examples</h1>
	<h2>Todo</h2>

	<div id="todoApp">
		<form data-simply-command="addEntry">
			<input type="text" name="newItem" class="new-todo" placeholder="What needs to be done?" autocomplete="off">
		</form>
		<ul class="todo-list" data-simply-list="items">
			<template>
				<li>
					<label data-simply-field="item">Item</label>
				</li>
			</template>
		</ul>
	</div>
</main>
<script src="../../packages/simplyflow/dist/simply.flow.js"></script>
<script class="source">
	var todoApp = simply.app({
		container: document.getElementById('todoApp'),
		commands: {
			addEntry: function(form, values) {
				this.actions.addEntry(values.newItem);
				form.elements.newItem.value = '';
			}
		},
		actions: {
			addEntry: async function(item) {
				this.data.items.push({
					item: item
				});
			}
		},
		data: {
			items: [
				{
					item: 'something'
				},
				{
					item: 'something else'
				}
			]
		}
	});
</script>
