<!doctype html>
<meta charset="utf-8">
<title>HNPWA step 1</title>
<link rel="stylesheet" href="hnpwa.css">
<h1>HNPWA - simply, step 1</h1>
<ul data-flow-list="items">
<template>
    <li>
        <span data-flow-field="title">title</span>
    </li>
</template>
</ul>
<script type="importmap">
  {
    "imports": {
      "@muze-labs/simplyflow":"../../src/flow.mjs",
      "@muze-nl/metro": "https://cdn.jsdelivr.net/npm/@muze-nl/metro@0.6.19/src/everything.mjs"
    }
  }
</script>
<script type="module">
import '@muze-labs/simplyflow'
import '@muze-nl/metro'

var hnpwa = simply.app({
  routes: {
    '/': async function() {
      this.actions.news()
    }
  },
  actions: {
    news: async function(page=1) {
      this.data.items = await this.api.news(page)
    }
  },
  data: {
    items: []
  },
  api: metro.jsonApi(
    'https://api.hackerwebapp.com/',
    {
      news: function(page=1) {
        return this.get('news', new URLSearchParams({ page }))
      }
    }
  )
})

simply.bind({
  root: hnpwa.data
})
