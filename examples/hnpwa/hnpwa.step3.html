<!doctype html>
<meta charset="utf-8">
<title>HNPWA step 3</title>
<link rel="stylesheet" href="hnpwa.css">
<h1>HNPWA Step 3</h1>
<section data-flow-field="page">
    <template data-flow-match="items">
        <ul class="items root" data-flow-list="items">
        <template>
            <li class="item">
                <a data-flow-field="id" data-flow-transform="comments_link">
                    <h2 data-flow-field="title" data-flow-transform="escape_html">title</h2>
                </a>
                <br>
                <span data-flow-field="time_ago">time-ago</span> 
                &bull; by <span data-flow-field="user">user</span> 
                &bull; <span class="site">(<span 
                    data-flow-field="domain">domain</span>)</span>
                <br>
                <a data-flow-field="id" data-flow-transform="comments_link" class="comments-link">
                    <input type="hidden" data-flow-field="id">
                    <span data-flow-field="comments_count">0</span> comments
                </a>
                &bull; <span data-flow-field="points">0</span> points
            </li>
        </template>
        </ul>
    </template>
    <template data-flow-match="item">
        <div>
            <a data-flow-field="item.url" data-flow-transform="fixed_content">
                <h2 data-flow-field="item.title" data-flow-transform="escape_html">Title</h2>
            </a>
            (<span data-flow-field="item.domain">domain</span>)
            <div data-flow-field="item.content"></div>
            <span data-flow-field="item.points">10</span> points 
            &bull; by <span data-flow-field="item.user">user</span> 
            <span data-flow-field="item.time_ago">time-ago</span>
            <div class="comments root" data-flow-list="item.comments">
              <template rel="comment"></template>
            </div>
        </div>
    </template>
</section>
<template id="comment">
    <details class="comment" open>
        <summary>
            <span data-flow-field="user">user</span>
            <span data-flow-field="time_ago">10</span> minutes ago
            <div class="content" data-flow-field="content">Content</div>
        </summary>
        <div class="comments" data-flow-list="comments">
            <template rel="comment"></template>
        </div>
    </details>
</template>
<script type="importmap">
{
    "imports": {
        "@muze-labs/simplyflow": "../../packages/simplyflow/dist/simply.flow.js",
        "@muze-nl/metro": "https://cdn.jsdelivr.net/npm/@muze-nl/metro@0.6.19/src/everything.mjs"
    }
}
</script>
<script type="module">
import '@muze-labs/simplyflow'
import '@muze-nl/metro'

var hnpwa = simply.app({
  routes: {
    '#comments/:id': async function(params) {
      this.actions.comments(params.id)
    },
    '#news': async function() {
      this.actions.news()
    },
    '/': function() {
      this.actions.news()
    }
  },
  actions: {
    news: async function(page=1) {
      this.data.items = await this.api.news(page)
      this.data.page = 'items'
    },
    comments: async function(commentId) {
      this.data.item = await this.api.item(commentId)
      this.data.page = 'item'
    }
  },
  data: {
    page: 'items',
    items: [],
    item: null
  },
  api: metro.api(
    'https://api.hackerwebapp.com/',
    {
      news: function(page=1) {
        return this.get('news', new URLSearchParams({ page }))
      },
      item: function(id) {
        return this.get('item/'+id)
      }
    }
  )
})

simply.bind({
  root: hnpwa.data,
  attribute: 'data-flow',
  transformers: {
    comments_link: function(context, next) {
      let href = ''+context.value
      if (href.indexOf('#comments')==-1) {
        href = '#comments/'+href
      }
      context.value = { href }
      next(context)
    }
  }
})

window.hnpwa = hnpwa
</script>
