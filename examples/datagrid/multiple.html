<!doctype html>
<meta charset="utf-8">
<title>datatable with virtual scrolling</title>
<link rel="stylesheet" href="../css/ds.css">
<link rel="stylesheet" href="../css/source.css">
<link rel="stylesheet" href="datatable.css">
<script type="importmap">
{
    "imports": {
        "@muze-labs/simplyflow": "../../packages/simplyflow/dist/simply.flow.js"
    }
}
</script>
<main>
	<h1>Multiple datatables</h1>
	<template id="datatable">
		<div>
			<table class="ds-datatable ds-datatable-sticky-header ds-datatable-rulers ds-datatable-virtual-scroll">
			<thead>
				<tr data-simply-map="columns">
					<template data-simply-field="visible" data-simply-match=":notempty">
						<th data-simply-command="toggleSort" data-simply-field="name"></th>
					</template>
				</tr>
			</thead>
			<tbody data-simply-list="rows">
				<template>
					<tr data-simply-map=":value">
						<template>
							<td data-simply-field=":value"></td>
						</template>
					</tr>
				</template>
			</tbody>
			</table>
		</div>
	</template>
	<div data-simply-field="users">
		<template rel="datatable" data-simply-link="columns=users.state.options.columns;rows=users.view.current"></template>
	</div>
	<div data-simply-field="groups">
		<template rel="datatable" data-simply-link="columns=groups.state.options.columns;rows=groups.view.current"></template>
	</div>
</main>
<output class="source" data-js="show-highlight-here"></output>

<script class="source" type="module" data-js="highlight">
	import '@muze-labs/simplyflow'
	const {effect, batch} = simply.state
	const {model, sort, columns, scroll} = simply.model

	async function main() {
		const usersModel = await getUsersModel()
		const groupsModel = await getGroupsModel()

		// set up databinding to render the users list

		const app = simply.app({
			commands: {
				toggleSort: function(el, value) {
					batch(() => {
						const sortBy = el.innerText.trim()
						this.data.users.state.options.sort.sortBy = Object.keys(this.data.users.state.options.columns)
							.find(key => this.data.users.state.options.columns[key].name==sortBy)
						const dir = this.data.users.state.options.sort.direction
						if (dir=='asc') {
							this.data.users.state.options.sort.direction = 'desc'
						} else {
							this.data.users.state.options.sort.direction = 'asc'
						}
					})
				}
			},
			data: {
				users: usersModel,
				groups: groupsModel
			}
		})
		window.app = app

		// update the sort indicators in the column on changes
		let lastSortColumn = null
		effect(() => {
			const sortBy = app.data.users.state.options.sort.sortBy
			const sortDirection = app.data.users.state.options.sort.direction
			if (lastSortColumn) {
				lastSortColumn.classList.remove('ds-datatable-sorted-ascending')
				lastSortColumn.classList.remove('ds-datatable-sorted-descending')
			}
			lastSortColumn = app.container.querySelector(`th[data-simply-key="${sortBy}"]`)
			if (lastSortColumn) {
				lastSortColumn.classList.add(`ds-datatable-sorted-${sortDirection}ending`)
			}
		})

	}

	main()

	async function getGroupsModel() {
		const groups = [
			{
				name: "admin",
				label: "Administrators"
			},
			{
				name: "public",
				label: "Public Access"
			},
			{
				name: "students",
				label: "Students"
			}
		]
		const groupsModel = model({
			data: groups,
			options: {

			}
		})
		groupsModel.addEffect(sort({ sortBy: 'name'}))
		groupsModel.addEffect(columns({
			name: {
				name: 'Name',
				visible: true		
			},
			label: {
				name: 'Label',
				visible: true
			}
		}))

		window.groupsModel = groupsModel
		return groupsModel
	}

	async function getUsersModel() {
		let response = await fetch('users.json')
		let users = await response.json()

		const usersModel = model({
			data: users,
			options: {

			}
		})

		// adds a sort effect, this must come before
		// the paging effect, since the content of each
		// page depends on the sort order of the entire list
		usersModel.addEffect(sort({ sortBy: 'last_name'}))

		usersModel.addEffect(scroll({
			name: 'scroll',
			rowHeight: 26,
			container: document.querySelector('.ds-scrollbox'),
			scrollbar: document.querySelector('.ds-datatable-scrollbar')
		}))

		// adds the effect to render visible columns
		usersModel.addEffect(columns({
			first_name: {
				name: 'First Name',
				visible: true
			},
			last_name: {
				name: 'Last Name',
				visible: true
			},
			email: {
				name: 'E-mail',
				visible: true
			},
			city: {
				name: 'City',
				visible: false
			},
			street: {
				name: 'Address',
				visible: false
			},
			gender_abbr: {
				name: 'Gender',
				visible: false
			},
			username: {
				name: 'Username',
				visible: false
			}
		}))

		usersModel.container = document.body
		// make the usersModel available in the console
		window.usersModel = usersModel
		return usersModel
	}
</script>
