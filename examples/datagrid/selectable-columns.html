<!doctype html>
<meta charset="utf-8">
<title>datatable with selectable columns</title>
<link rel="stylesheet" href="../css/ds.css">
<link rel="stylesheet" href="../css/source.css">
<link rel="stylesheet" href="datatable.css">
<script type="importmap">
{
    "imports": {
        "@muze-labs/simplyflow": "../../packages/simplyflow/dist/simply.flow.js"
    }
}
</script>
<script type="module">
  if (!("anchorName" in document.documentElement.style)) {
    import("https://unpkg.com/@oddbird/css-anchor-positioning");
  }
</script>
<main>
	<h1>Datatable with selectable columns</h1>
	<button class="ds-dropdown ds-dropdown ds-datatable-column-select" popovertarget="menu" popovertargetaction="toggle">
		<svg class="ds-icon ds-icon-feather">
			<use xlink:href="../css/feather-sprite.svg#plus"></use>
		</svg>
	</button>
	<nav class="ds-datatable-column-toggle ds-dropdown-nav ds-dropdown-right ds-align-left" popover id="menu">
		<ul class="ds-dropdown-list" data-simply-map="users.state.options.columns">
			<template>
				<li class="ds-dropdown-item">
					<label>
						<input type="checkbox" data-simply-edit="visible">
						<span data-simply-field="name"></span>
					</label>
				</li>
			</template>
		</ul>
	</nav>
	<table class="ds-datatable ds-datatable-sticky-header ds-datatable-rulers">
	<thead>
		<tr data-simply-map="users.state.options.columns">
			<template data-simply-field="visible" data-simply-match=":notempty">
				<th data-simply-field="name"></th>
			</template>
		</tr>
	</thead>
	<tbody data-simply-list="users.view.current">
		<template>
			<tr data-simply-map=":value">
				<template>
					<td data-simply-field=":value"></td>
				</template>
			</tr>
		</template>
	</tbody>
	</table>
</main>

<script class="source" type="module">
	import '@muze-labs/simplyflow'
	const {model, columns} = simply.model

	async function main() {
		let response = await fetch('users.json')
		let users = await response.json()

		const usersModel = model({
			data: users,
			options: {

			}
		})

		// adds the effect to render visible columns
		usersModel.addEffect(columns({
			first_name: {
				name: 'First Name',
				visible: true
			},
			last_name: {
				name: 'Last Name',
				visible: true
			},
			email: {
				name: 'E-mail',
				visible: true
			},
			city: {
				name: 'City',
				visible: false
			},
			street: {
				name: 'Address',
				visible: false
			},
			gender_abbr: {
				name: 'Gender',
				visible: false
			},
			username: {
				name: 'Username',
				visible: false
			}
		}))

		const usersApp = simply.app({
			data: {
				users: usersModel
			}
		})

		// make the usersModel available in the console
		window.usersModel = usersModel
		window.usersApp = usersApp
	}

	main()
</script>
