<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyFlow two-way databinding test</title>
  </head>
  <body>
    <h1>SimplyFlow two-way databinding test</h1>
    <p>Editor:</p>
    <div id="editor" data-flow-field="demo" contenteditable>Initial content</div>
    <p>Listener</p>
    <div data-flow-field="demo"></div>
    <ul data-flow-list="list">
      <template>
        <li data-flow-field=":value">field</li>
      </template>
    </ul>
    <script src="../../packages/simplyflow/dist/simply.flow.js"></script>
    <script>
      const data = simply.state.signal({
        list: ['a','b']
      })
      simply.bind({
        root: data,
        twoway: true
      })
      const editor = document.getElementById('editor')
    </script>
  </body>
</html>
