<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimplyFlow two-way databinding test</title>
  </head>
  <body>
    <h1>SimplyFlow two-way databinding test</h1>
    <p>Editor:</p>
    <div id="editor" data-simply-edit="demo" contenteditable>Initial content</div>
    <p>Listener</p>
    <div data-simply-field="demo"></div>
    <ul data-simply-list="list">
      <template>
        <li data-simply-field=":value">field</li>
      </template>
    </ul>
    <script src="../../packages/simplyflow/dist/simply.flow.js"></script>
    <script>
      const twoWayApp = simply.app({
        data: {
          demo: 'Initial content',
          list: ['a','b']
        }
      })
      const editor = document.getElementById('editor')
      window.twoWayApp = twoWayApp
    </script>
  </body>
</html>
