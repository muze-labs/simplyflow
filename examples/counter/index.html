<!doctype html>
<meta charset="utf-8">
<title>Todo</title>
<link rel="stylesheet" href="../css/ds.css">
<link rel="stylesheet" href="../css/source.css">
<link rel="stylesheet" href="../css/examples.css">
<body>
<main>
	<h1>Examples</h1>
	<h2>Counter</h2>

	<div id="counterApp">
		<input type="text" data-simply-edit="counter">
		<button data-simply-command="add1">+</button>
		<button data-simply-command="sub1">-</button>
		<div>Counter is now: <span data-simply-field="counter"></span></div>
	</div>

	<div id="counterApp2">
		<input type="text" data-simply-edit="counter">
		<button data-simply-command="add1">+</button>
		<button data-simply-command="sub1">-</button>
		<div>Counter is now: <span data-simply-field="counter"></span></div>
	</div>
</main>
<script src="../../packages/simplyflow/dist/simply.flow.js"></script>
<script class="source">
	var counterApp = simply.app({
		container: document.getElementById('counterApp'),
		commands: {
			add1: function() {
				this.data.counter++;
			},
			sub1: function() {
				this.data.counter--;
			}
		},
		data: {
			counter: 1
		}
	});

	var counterApp2 = simply.app({
		container: document.getElementById('counterApp2'),
		commands: {
			add1: function() {
				this.data.counter++;
			},
			sub1: function() {
				this.data.counter--;
			}
		},
		data: {
			counter: 1
		}
	});

</script>
